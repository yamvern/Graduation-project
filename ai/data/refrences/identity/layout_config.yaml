# Watheq Layout Configuration — Yemeni National ID Card
# تكوين تخطيط البطاقة الشخصية اليمنية
#
# This file maps reference image filenames to canonical element class names,
# defines expected ROI positions (normalized 0-1), and training/verification params.
# When adding a new document type, create a similar file in its reference folder.

doc_type: identity
doc_name: "Yemeni National ID Card"
version: "3.0"

# Element definitions: maps ref_file stem → canonical class name + layout
elements:
  logo:
    class_name: logo_main
    ref_file: logo.png
    roi: { x: 0.02, y: 0.02, w: 0.15, h: 0.20 }
    tolerance: 0.08
    weight: 1.5
    critical: true
    type: visual    # visual | text

  seal:
    class_name: stamp
    ref_file: seal.jpeg
    roi: { x: 0.60, y: 0.70, w: 0.15, h: 0.25 }
    tolerance: 0.12
    weight: 1.5
    critical: true
    type: visual

  full:
    class_name: photo_primary
    ref_file: full.jpeg
    roi: { x: 0.75, y: 0.15, w: 0.22, h: 0.55 }
    tolerance: 0.10
    weight: 1.0
    critical: true
    type: visual

  barcode:
    class_name: barcode
    ref_file: barcode.png
    roi: { x: 0.05, y: 0.80, w: 0.50, h: 0.15 }
    tolerance: 0.12
    weight: 1.3
    critical: false
    type: visual

# Text regions — no reference image, detected by position
# Font profiles are learned during training from the document image
text_regions:
  text_name:
    class_name: text_name
    roi: { x: 0.20, y: 0.20, w: 0.50, h: 0.10 }
    tolerance: 0.12
    weight: 1.0
    critical: false
    type: text

  text_national_id:
    class_name: text_national_id
    roi: { x: 0.20, y: 0.35, w: 0.50, h: 0.08 }
    tolerance: 0.12
    weight: 1.2
    critical: false
    type: text

# Thresholds
thresholds:
  pass_score: 0.95
  suspicious_score: 0.70
  fail_score: 0.0

# Training parameters — deep training for 95% threshold
training:
  n_genuine: 1000
  n_forged: 1000
  epochs: 50
  batch_size: 32
  learning_rate: 0.00005
  early_stopping_patience: 12
  val_split: 0.2
  image_size: 224
